name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.1.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional, will use CHANGELOG if empty)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OBS assets
        run: npm run build

      - name: Prepare release package
        run: npm run package:release
      
      - name: Determine Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG_NAME="v$VERSION"
            RELEASE_NAME="Release v$VERSION"
            PRERELEASE="false"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            REF_NAME="${{ github.ref_name }}"
            VERSION="${REF_NAME#v}"
            TAG_NAME="$REF_NAME"
            RELEASE_NAME="Release $REF_NAME"
            PRERELEASE="false"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="$BASE_VERSION-main.${GITHUB_RUN_NUMBER}"
            TAG_NAME="main-${BASE_VERSION}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_NAME="Release ${BASE_VERSION} main #${GITHUB_RUN_NUMBER}"
            PRERELEASE="false"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
          echo "PRERELEASE=$PRERELEASE" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"
          echo "Tag name: $TAG_NAME"

      - name: Validate version format
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in format X.Y.Z (e.g., 2.1.0). Got: $VERSION"
            exit 1
          fi
          echo "Version validated: $VERSION"
      
      - name: Check if tag exists (Manual only)
        if: github.event_name == 'workflow_dispatch'
        id: check_tag
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists!"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME is available"
          fi
      
      - name: Create release package
        run: |
          PKG_NAME="htmlTextSlideshow-${VERSION}.zip"
          cd release-package
          zip -r "../$PKG_NAME" .
          cd ..
          echo "📦 Release package contents:"
          unzip -l "$PKG_NAME"
          echo "✅ Created ZIP: $PKG_NAME"
      
      - name: Extract release notes from CHANGELOG
        id: changelog
        if: inputs.release_notes == ''
        run: |
          # Find changelog file (case insensitive)
          CHANGELOG_FILE=$(find . -maxdepth 1 -iname "changelog.md" | head -n 1)
          if [ -z "$CHANGELOG_FILE" ]; then
            echo "⚠️  Changelog file not found."
            echo "Release $VERSION" > /tmp/release_notes.txt
            exit 0
          fi
          
          echo "Using changelog: $CHANGELOG_FILE"

          TARGET_VERSION="$VERSION"
          if [ "$PRERELEASE" = "true" ]; then
            TARGET_VERSION=$(node -p "require('./package.json').version")
          fi

          if grep -Fq "## [$TARGET_VERSION]" "$CHANGELOG_FILE"; then
            awk -v target="$TARGET_VERSION" '
              BEGIN { in_section = 0; found = 0 }
              # Match header line like "## [2.3.0]..."
              /^## \[/ && index($0, "[" target "]") { in_section = 1; found = 1; next }
              # Stop at next header "^## [" or horizontal rule "^---"
              /^## \[/ && found == 1 { exit }
              /^---$/ && in_section == 1 { exit }
              in_section == 1 { print }
            ' "$CHANGELOG_FILE" > /tmp/release_notes.txt
          else
            echo "⚠️  Warning: Version $TARGET_VERSION not found in $CHANGELOG_FILE"
            echo "Release $VERSION" > /tmp/release_notes.txt
          fi

          if [ "$PRERELEASE" = "true" ]; then
            {
              echo
              echo "## Build info"
              echo
              echo "- Branch: main"
              echo "- Commit: ${{ github.sha }}"
              echo "- Run: ${{ github.run_number }}"
            } >> /tmp/release_notes.txt
          fi
          
          # Output notes using GitHub Actions multiline format (preserves markdown)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Git tag (Manual only)
        if: github.event_name == 'workflow_dispatch' && steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $VERSION"
          git push origin "$TAG_NAME"

      - name: Create Git tag (Main release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists, skipping tag creation."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Release $VERSION"
          git push origin "$TAG_NAME"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: ${{ steps.get_version.outputs.release_name }}
          body: |
            ${{ inputs.release_notes != '' && inputs.release_notes || steps.changelog.outputs.notes }}
            
            ## 📦 Download
            
            Download the ZIP file below, extract it, and use the root `Dock.html` and `Source.html` paths shown by the Lua script inside OBS Studio.
          files: htmlTextSlideshow-${{ steps.get_version.outputs.version }}.zip
          draft: false
          prerelease: ${{ steps.get_version.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

